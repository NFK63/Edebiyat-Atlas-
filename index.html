<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFK Edebiyat Atlası</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #fdfaf1; color: #333; overflow: hidden; }
        #welcome-screen { position: absolute; width: 100%; height: 100%; background: #fdfaf1; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .choice-btn { padding: 15px 40px; font-size: 20px; font-weight: bold; cursor: pointer; border: 2px solid #d4a373; background: white; color: #d4a373; border-radius: 10px; margin: 10px; transition: 0.3s; }
        .choice-btn:hover { background: #d4a373; color: white; }
        #map { height: 100vh; width: 100%; display: none; }
        .back-btn { position: absolute; top: 20px; left: 20px; z-index: 1000; padding: 10px 20px; background: #e74c3c; color: white; border: none; cursor: pointer; border-radius: 5px; display: none; }
        .custom-pin { display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); border: 2px solid white; }
        .custom-pin i { transform: rotate(45deg); font-style: normal; font-size: 14px; color: white; }
    </style>
</head>
<body>
    <div id="welcome-screen">
        <h1>NFK EDEBİYAT ATLASI</h1>
        <div class="btn-container">
            <button class="choice-btn" onclick="startApp('hikaye')">HİKAYELER</button>
            <button class="choice-btn" onclick="startApp('roman')">ROMANLAR</button>
        </div>
    </div>
    <button class="back-btn" id="backBtn" onclick="location.reload()">⬅ GERİ</button>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map;
        var markers = [];
        var veriler = {
            hikaye: [
                // Yüklediğin Dosyadaki 61-80 Arası Hikayeler
                { ad: "Birlikte Güçlüyüz", yazar: "Emre Kaya", yer: "Adana", koord: [36.99, 35.32], ozet: "Adana'da maddi zorluklara rağmen el ele veren bir aile." }, [cite: 3, 4, 5]
                { ad: "Aynı Çatı Altında", yazar: "Zeynep Demir", yer: "Antalya", koord: [36.88, 30.70], ozet: "Antalya'da farklı kuşakların sevgiyle bir arada yaşaması." }, [cite: 9, 10, 11]
                { ad: "Annenin Eli", yazar: "Fatma Yıldız", yer: "Mersin", koord: [36.81, 34.63], ozet: "Mersin'de annesinin fedakârlıklarını fark eden bir çocuğun öyküsü." }, [cite: 15, 16, 17]
                { ad: "Babamın Öğrettiği", yazar: "Ahmet Arslan", yer: "Hatay", koord: [36.20, 36.16], ozet: "Hatay'da bir babanın çocuğuna verdiği hayat dersleri." }, [cite: 21, 22, 23]
                { ad: "Kardeşlik", yazar: "Elif Koç", yer: "Isparta", koord: [37.76, 30.55], ozet: "Isparta'da iki kardeşin birbirine desteği." }, [cite: 27, 28, 29]
                { ad: "Bayram Sabahı", yazar: "Hasan Yıldırım", yer: "Burdur", koord: [37.72, 30.28], ozet: "Burdur'da bayramın getirdiği aile birliği." }, [cite: 33, 34, 35]
                { ad: "Evin Sessizliği", yazar: "Ayşe Arslan", yer: "Osmaniye", koord: [37.07, 36.24], ozet: "Osmaniye'de çocukları giden ailenin hüzünlü sessizliği." }, [cite: 39, 40, 41]
                { ad: "Bir Sofra Etrafında", yazar: "Mehmet Demir", yer: "Antalya", koord: [36.90, 30.65], ozet: "Antalya'da ailenin yemekteki ortak mutluluğu." }, [cite: 45, 46, 47]
                { ad: "Küçük Bir Özür", yazar: "Dilan Koç", yer: "Adana", koord: [37.00, 35.30], ozet: "Adana'da hatasını kabul eden bir çocuğun hikâyesi." }, [cite: 51, 52, 53]
                { ad: "Eller Birleşince", yazar: "Kerem Yılmaz", yer: "Mersin", koord: [36.80, 34.60], ozet: "Mersin'de ailece çözülen sorunlar." }, [cite: 57, 58, 59]
                { ad: "Paylaşılan Yük", yazar: "Selin Yılmaz", yer: "Antalya", koord: [36.85, 30.75], ozet: "Antalya'da taşınma sürecindeki dayanışma." }, [cite: 63, 64, 65]
                { ad: "Büyükannenin Hikâyesi", yazar: "Ayla Koç", yer: "Hatay", koord: [36.15, 36.10], ozet: "Hatay'da geçmişi anlatan bir büyükanne." }, [cite: 69, 70, 71]
                { ad: "Sessiz Destek", yazar: "Burcu Demir", yer: "Mersin", koord: [36.75, 34.55], ozet: "Mersin'de öğrenciye verilen manevi destek." }, [cite: 75, 76, 77]
                { ad: "Birlikte Onarmak", yazar: "Hakan Arslan", yer: "Adana", koord: [37.05, 35.35], ozet: "Adana'da ailenin evi birlikte tamir etmesi." }, [cite: 81, 82, 83]
                { ad: "Küçük Mutluluklar", yazar: "Zeynep Yıldız", yer: "Isparta", koord: [37.80, 30.60], ozet: "Isparta'da küçük anların değeri." }, [cite: 87, 88, 89]
                { ad: "Geri Dönüş", yazar: "Emre Koç", yer: "Burdur", koord: [37.75, 30.30], ozet: "Burdur'da ailenin değerini anlayan gencin dönüşü." }, [cite: 93, 94, 95]
                { ad: "Birlikte Başarmak", yazar: "Fatih Demir", yer: "Osmaniye", koord: [37.10, 36.30], ozet: "Osmaniye'de başarı yolunda aile desteği." }, [cite: 99, 100, 101]
                { ad: "Akşam Çayı", yazar: "Derya Arslan", yer: "Antalya", koord: [36.82, 30.80], ozet: "Antalya'da akşam çayındaki samimi iletişim." }, [cite: 105, 106, 107]
                { ad: "Birlikte Susmak", yazar: "Kerem Arslan", yer: "Mersin", koord: [36.70, 34.50], ozet: "Mersin'de zor anlarda kenetlenen bir aile." }, [cite: 111, 112, 113]
                { ad: "Son Lokma", yazar: "Elif Demir", yer: "Adana", koord: [37.02, 35.28], ozet: "Adana'da sofradaki fedakârlık ve paylaşım." }, [cite: 117, 118, 119]
                
                // Mesajla Gönderdiğin Diğer Hikayeler (1-28)
                { ad: "Buzlu Dağların Sıcaklığı", yazar: "Sibel Yılmaz", yer: "Van", koord: [38.50, 43.38], ozet: "Van fırtınasında yardımlaşan bir aile." },
                { ad: "Göç Yolunda", yazar: "Mehmet Kaya", yer: "Muş", koord: [38.73, 41.48], ozet: "Sel felaketinde ailenin birlikte hareketi." },
                { ad: "Dağ Tepesindeki Mektup", yazar: "Elif Akdoğan", yer: "Ağrı", koord: [39.71, 43.05], ozet: "Ağrı'da mektupla hissedilen aile sevgisi." },
                { ad: "Kaşağı", yazar: "Ömer Seyfettin", yer: "Gönen", koord: [40.10, 27.65], ozet: "Vicdan azabı ve dürüstlük." },
                { ad: "Semaver", yazar: "Sait Faik", yer: "İstanbul", koord: [41.03, 28.93], ozet: "Anne sevgisi ve bağlılık." }
            ],
            roman: [
                { ad: "Huzur", yazar: "A. Hamdi Tanpınar", yer: "İstanbul", koord: [41.01, 28.96], ozet: "Eski İstanbul'da aile ve huzur arayışı." },
                { ad: "Yaprak Dökümü", yazar: "Reşat Nuri", yer: "İstanbul", koord: [41.02, 29.00], ozet: "Dağılan bir ailenin dramı." },
                { ad: "Çalıkuşu", yazar: "Reşat Nuri", yer: "Bursa", koord: [40.18, 29.06], ozet: "Feride'nin idealist öğretmenlik hikâyesi." },
                { ad: "İnce Memed", yazar: "Yaşar Kemal", yer: "Adana", koord: [37.20, 35.40], ozet: "Zulme başkaldıran Anadolu kahramanı." }
            ]
        };
        function startApp(tur) {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('map').style.display = 'block';
            document.getElementById('backBtn').style.display = 'block';
            if (!map) {
                map = L.map('map', { center: [38.96, 35.24], zoom: 6, minZoom: 6, maxBounds: [[33, 25], [43, 45]] });
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            }
            markers.forEach(m => map.removeLayer(m));
            veriler[tur].forEach(function(item) {
                var m = L.marker(item.koord).addTo(map).bindPopup("<b>"+item.ad+"</b><br>"+item.yazar+" - "+item.yer+"<hr>"+item.ozet);
                markers.push(m);
            });
        }
    </script>
</body>
</html>
