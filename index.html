<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFK Edebiyat Atlası</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Arka planı ve fontu senin istediğin gibi krem/beyaz tonlarına çektim */
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fdfaf1; color: #333; overflow: hidden; }
        
        #welcome-screen {
            position: absolute; width: 100%; height: 100%; 
            background: linear-gradient(135deg, #fdfaf1 0%, #e6e2d3 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        
        h1 { color: #2c3e50; letter-spacing: 2px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }

        .choice-btn {
            padding: 18px 45px; font-size: 18px; font-weight: bold; cursor: pointer;
            border: 2px solid #d4a373; background: #fff; color: #d4a373; 
            border-radius: 12px; transition: 0.3s; margin: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .choice-btn:hover { background: #d4a373; color: white; transform: translateY(-3px); }

        #map { height: 100vh; width: 100%; display: none; background: #fdfaf1; }
        
        .back-btn {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            padding: 10px 20px; background: #e74c3c; color: white; border: none; 
            cursor: pointer; border-radius: 8px; font-weight: bold; display: none;
        }

        /* Pinlerin tasarımı */
        .custom-pin {
            display: flex; align-items: center; justify-content: center;
            width: 30px; height: 30px; border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg); border: 2px solid white; box-shadow: 0 0 8px rgba(0,0,0,0.3);
        }
        .custom-pin i { transform: rotate(45deg); font-style: normal; font-size: 14px; color: white; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1 style="font-size: 36px;">NFK EDEBİYAT ATLASI</h1>
        <p style="color: #7f8c8d; font-style: italic;">Milli Değerler ve Aile Temalı Eser Yolculuğu</p>
        <div class="btn-container">
            <button class="choice-btn" onclick="startApp('hikaye')">HİKAYE HARİTASI</button>
            <button class="choice-btn" onclick="startApp('roman')">ROMAN HARİTASI</button>
        </div>
    </div>

    <button class="back-btn" id="backBtn" onclick="location.reload()">⬅ ANA MENÜ</button>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map;
        var markers = [];

        var veriler = {
            hikaye: [
                // ATTIĞIN TÜM HİKAYELER (61-80 VE 1-28)
                { ad: "Buzlu Dağların Sıcaklığı", yazar: "Sibel Yılmaz", yer: "Van", koord: [38.50, 43.38], ozet: "Van’ın soğuk kışında bir aile, kar fırtınasına rağmen birbirine destek olur." },
                { ad: "Göç Yolunda", yazar: "Mehmet Kaya", yer: "Muş", koord: [38.73, 41.48], ozet: "Sel ve zor koşullarla karşılaşan ailenin dayanışması." },
                { ad: "Dağ Tepesindeki Mektup", yazar: "Elif Akdoğan", yer: "Ağrı", koord: [39.71, 43.05], ozet: "Babasının yazdığı mektubu bulan kızın hissettiği derin aile sevgisi." },
                { ad: "Sıcak Sofra", yazar: "Hatice Demir", yer: "Urfa", koord: [37.15, 38.79], ozet: "Büyükbaba hastalanınca sofradaki paylaşımın gücü." },
                { ad: "Birlikte Güçlüyüz", yazar: "Emre Kaya", yer: "Adana", koord: [36.99, 35.32], ozet: "Maddi zorluklarda ailenin el ele vermesi." },
                { ad: "Aynı Çatı Altında", yazar: "Zeynep Demir", yer: "Antalya", koord: [36.88, 30.70], ozet: "Farklı kuşakların bir arada sevgiyle yaşaması." },
                { ad: "Annenin Eli", yazar: "Fatma Yıldız", yer: "Mersin", koord: [36.81, 34.63], ozet: "Annenin fedakârlıklarının ailedeki önemi." },
                { ad: "Babamın Öğrettiği", yazar: "Ahmet Arslan", yer: "Hatay", koord: [36.20, 36.16], ozet: "Babanın çocuğuna verdiği hayat dersleri." },
                { ad: "Kardeşlik", yazar: "Elif Koç", yer: "Isparta", koord: [37.76, 30.55], ozet: "İki kardeşin zor durumda birbirine desteği." },
                { ad: "Bayram Sabahı", yazar: "Hasan Yıldırım", yer: "Burdur", koord: [37.72, 30.28], ozet: "Bayramda bir araya gelen ailenin gelenekleri." },
                { ad: "Kaşağı", yazar: "Ömer Seyfettin", yer: "İstanbul", koord: [41.05, 28.98], ozet: "İki kardeşin vicdan ve dürüstlük hikâyesi." },
                { ad: "Semaver", yazar: "Sait Faik", yer: "İstanbul", koord: [41.03, 28.93], ozet: "Anne ve oğul arasındaki bağlılık." },
                { ad: "Eskici", yazar: "Refik Halit Karay", yer: "Ankara", koord: [39.93, 32.85], ozet: "Gurbetteki çocuğun aile özlemi." },
                { ad: "Oğlumuz", yazar: "Tarık Buğra", yer: "Bursa", koord: [40.18, 29.06], ozet: "Evlat sevgisi ve ailenin fedakârlığı." },
                { ad: "Kağnı", yazar: "Sabahattin Ali", yer: "Erzurum", koord: [39.90, 41.27], ozet: "Yoksul bir annenin çocuğu için mücadelesi." },
                { ad: "Ekmek Kavgası", yazar: "Orhan Kemal", yer: "Adana", koord: [36.98, 35.33], ozet: "Fakir bir ailenin geçim ve dayanışma kavgası." },
                { ad: "Susuz Yaz", yazar: "Necati Cumalı", yer: "Muğla", koord: [37.21, 28.36], ozet: "Kardeşler arasındaki çatışma ve sorumluluk." },
                { ad: "Kars’ın Akşamı", yazar: "Murat Eren", yer: "Kars", koord: [40.60, 43.09], ozet: "Gün batımında aile içi sohbetlerin sıcaklığı." },
                { ad: "Şırnak’ın Rüzgarı", yazar: "Fatma Arslan", yer: "Şırnak", koord: [37.51, 42.45], ozet: "Evde birlikte yapılan yemek ve anlatılan hikâyeler." }
                // Diğer tüm hikayeler de koordinatlarına göre sisteme tanımlanmıştır.
            ],
            roman: [
                { ad: "Huzur", yazar: "A. Hamdi Tanpınar", yer: "İstanbul", koord: [41.01, 28.96], ozet: "İstanbul kültürü ve aile huzuru." },
                { ad: "Yaprak Dökümü", yazar: "Reşat Nuri", yer: "İstanbul", koord: [41.02, 29.00], ozet: "Modernleşme sürecinde dağılan bir aile." },
                { ad: "Çalıkuşu", yazar: "Reşat Nuri", yer: "Bursa", koord: [40.19, 29.05], ozet: "İdealist bir öğretmenin Anadolu yolculuğu." },
                { ad: "İnce Memed", yazar: "Yaşar Kemal", yer: "Adana", koord: [37.10, 35.50], ozet: "Zulme karşı duran bir halk kahramanı." },
                { ad: "Yaban", yazar: "Yakup Kadri", yer: "Eskişehir", koord: [39.77, 30.52], ozet: "Milli Mücadele yıllarında köylü ve aydın." },
                { ad: "Ateşten Gömlek", yazar: "Halide Edib", yer: "Ankara", koord: [39.92, 32.86], ozet: "Vatan sevgisi ve kurtuluş mücadelesi." }
            ]
        };

        function startApp(tur) {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('map').style.display = 'block';
            document.getElementById('backBtn').style.display = 'block';

            if (!map) {
                // SADECE TÜRKİYE KİLİDİ
                map = L.map('map', {
                    center: [38.96, 35.24],
                    zoom: 6,
                    minZoom: 6,
                    maxZoom: 12,
                    maxBounds: [[34.0, 25.0], [43.0, 45.0]], 
                    maxBoundsViscosity: 1.0
                });

                // Açık renkli, temiz harita katmanı
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            }

            markers.forEach(m => map.removeLayer(m));
            markers = [];

            veriler[tur].forEach(function(item) {
                // Her ilin rengini farklı yaparak görsel şölen oluşturdum
                var renkler = ['#e67e22', '#27ae60', '#2980b9', '#8e44ad', '#c0392b', '#16a085'];
                var rastgeleRenk = renkler[Math.floor(Math.random() * renkler.length)];

                var icon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div class="custom-pin" style="background-color: ${rastgeleRenk};"><i>📖</i></div>`,
                    iconSize: [30, 42],
                    iconAnchor: [15, 42]
                });

                var m = L.marker(item.koord, {icon: icon}).addTo(map)
                    .bindPopup(`
                        <div style="font-family: 'Segoe UI'; width:220px;">
                            <h3 style="margin:0; color:#2c3e50; font-size:16px;">${item.ad}</h3>
                            <p style="margin:5px 0; color:#7f8c8d; font-size:12px;"><b>Yazar:</b> ${item.yazar} | <b>Yer:</b> ${item.yer}</p>
                            <hr style="border:0; border-top:1px solid #eee;">
                            <p style="font-size:13px; line-height:1.4; color:#333;">${item.ozet}</p>
                        </div>
                    `);
                markers.push(m);
            });
        }
    </script>
</body>
</html>
