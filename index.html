<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Edebiyat Atlası - Çalışan Versiyon</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a1a1f; height: 100vh; overflow: hidden; }
        /* Seçim ekranı */
        .secim-ekrani {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a1a1f;
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s;
        }
        .secim-kutusu {
            background: #0f1a24;
            padding: 40px 50px;
            border-radius: 40px;
            text-align: center;
            border: 1px solid #ff9f4a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .secim-kutusu h1 { color: #ffb86b; font-size: 2rem; margin-bottom: 10px; }
        .secim-kutusu p { color: #aac8e0; margin-bottom: 30px; }
        .secim-butonlari { display: flex; gap: 20px; justify-content: center; }
        .secim-butonu {
            background: #1e2e3b;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }
        .secim-butonu:first-child { border-left: 4px solid #ff3333; }
        .secim-butonu:last-child { border-left: 4px solid #3399ff; }
        .secim-butonu:hover { background: #2a4455; transform: scale(1.02); }
        /* Uygulama container */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100%;
            opacity: 0;
            transition: opacity 0.5s;
        }
        #harita { flex: 3; height: 100vh; }
        .panel {
            flex: 1;
            background: #0f1a24;
            color: #eef4ff;
            overflow-y: auto;
            padding: 20px;
            border-left: 3px solid #ff9f4a;
            display: flex;
            flex-direction: column;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .panel h2 { color: #ff9f4a; font-size: 1.3rem; border-bottom: 2px solid #ff9f4a; display: inline-block; }
        .btn-ana-menu {
            background: #2a4455;
            border: none;
            padding: 5px 12px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .btn-ana-menu:hover { background: #ff9f4a; color: #0a1a1f; }
        .arama-kutusu {
            width: 100%;
            padding: 8px 12px;
            border-radius: 30px;
            border: none;
            background: #1e2e3b;
            color: white;
            margin-bottom: 15px;
        }
        .hikaye-listesi { display: flex; flex-direction: column; gap: 10px; flex: 1; overflow-y: auto; }
        .hikaye-karti {
            background: #1e2e3b;
            border-radius: 14px;
            padding: 10px;
            cursor: pointer;
            border-left: 4px solid #ff9f4a;
            transition: 0.1s;
        }
        .hikaye-karti:hover { background: #2a4455; transform: translateX(3px); }
        .hikaye-baslik { font-weight: bold; color: #ffb86b; margin-bottom: 4px; }
        .hikaye-ozet { font-size: 0.7rem; color: #cddcec; }
        .custom-popup .leaflet-popup-content-wrapper {
            background: #1e2e3b;
            color: #f0f0f0;
            border-radius: 16px;
            border-left: 4px solid #ff9f4a;
        }
        .popup-title { font-weight: bold; color: #ffb86b; margin-bottom: 6px; }
        .popup-biyografi { font-size: 0.7rem; color: #aaa; border-top: 1px solid #444; margin-top: 6px; padding-top: 6px; }
    </style>
</head>
<body>
<div class="secim-ekrani" id="secimEkrani">
    <div class="secim-kutusu">
        <h1>📚 Edebiyat Atlası</h1>
        <p>Hangi türü keşfetmek istersin?</p>
        <div class="secim-butonlari">
            <button class="secim-butonu" id="hikayeSec">📖 Hikayeler</button>
            <button class="secim-butonu" id="romanSec">📕 Romanlar</button>
        </div>
    </div>
</div>
<div class="app-container" id="appContainer">
    <div id="harita"></div>
    <div class="panel">
        <div class="panel-header">
            <h2 id="panelBaslik">📖 Hikayeler</h2>
            <button class="btn-ana-menu" id="anaMenuBtn">🏠 Ana Menü</button>
        </div>
        <input type="text" class="arama-kutusu" id="aramaInput" placeholder="🔍 Hikaye, yazar veya şehir ara...">
        <div class="hikaye-listesi" id="hikayeListesi"></div>
    </div>
</div>

<script>
    // ---------------------- ŞEHİR KOORDİNATLARI (sadece birkaç test şehri) ----------------------
    const sehirMerkezleri = {
        "İstanbul": [41.0082, 28.9784],
        "Ankara": [39.9334, 32.8597],
        "Adana": [37.0000, 35.3213],
        "İzmir": [38.4192, 27.1287],
        "Bursa": [40.1885, 29.0610]
    };

    // ---------------------- YAZAR BİYOGRAFİLERİ ----------------------
    const yazarBiyografi = {
        "Ahmet Ümit": "1960 doğumlu, polisiye yazarı. Başkomser Nevzat serisiyle tanınır.",
        "Elif Şafak": "1971 doğumlu, çağdaş Türk edebiyatının önde gelen yazarlarından.",
        "Orhan Pamuk": "Nobel ödüllü yazar, eserleri 60'tan fazla dile çevrildi."
    };

    // ---------------------- ÖRNEK HİKAYELER (çalıştığını göstermek için) ----------------------
    const hikayeler = [
        { baslik: "İstanbul Hatırası", ozet: "Bir ailenin İstanbul'da geçen dramı. Dayanışma ve fedakarlık öne çıkar.", sehir: "İstanbul", yazar: "Ahmet Ümit" },
        { baslik: "Ankara'nın Bağları", ozet: "Ankara'da yaşayan bir ailenin komşuluk ilişkileri ve aile bağları.", sehir: "Ankara", yazar: "Elif Şafak" },
        { baslik: "Adana'da Bir Akşam", ozet: "Adana'da aile büyüklerinin anlattığı eski hikayeler.", sehir: "Adana", yazar: "Orhan Pamuk" }
    ];

    const romanlar = [
        { baslik: "Kürk Mantolu Madonna", ozet: "Sabahattin Ali'nin unutulmaz romanı. Aile ve yalnızlık temaları.", sehir: "İstanbul", yazar: "Sabahattin Ali", yil: 1943 },
        { baslik: "İnce Memed", ozet: "Yaşar Kemal'in başyapıtı. Aile bağları ve toprak mücadelesi.", sehir: "Adana", yazar: "Yaşar Kemal", yil: 1955 }
    ];

    // ---------------------- JİTTER (konumları hafif kaydır) ----------------------
    function jitterCoord(coord, idx) {
        return [coord[0] + (Math.sin(idx) * 0.01), coord[1] + (Math.cos(idx) * 0.01)];
    }

    // ---------------------- HARİTA VE MARKER YÖNETİMİ ----------------------
    let map;
    let currentMarkers = [];
    let currentMode = "hikaye"; // 'hikaye' veya 'roman'
    let currentData = hikayeler; // başlangıç

    function initMap() {
        if (map) {
            map.remove();
        }
        map = L.map('harita').setView([39.5, 33.5], 6);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CartoDB',
            maxZoom: 18
        }).addTo(map);
        // Türkiye sınırları
        const turkiyeBounds = [[35.5, 25.5], [42.5, 45.0]];
        map.setMaxBounds(turkiyeBounds);
        map.on('drag', () => map.panInsideBounds(turkiyeBounds, { animate: false }));
        // Boyutlandırma sorununu çözmek için
        setTimeout(() => { map.invalidateSize(); }, 100);
    }

    function getIcon(mode) {
        const color = mode === "hikaye" ? "#ff3333" : "#3399ff";
        const emoji = mode === "hikaye" ? "📖" : "📕";
        return L.divIcon({
            html: `<div style="width:34px;height:34px;background:${color};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid white;box-shadow:0 2px 8px black;">${emoji}</div>`,
            className: "",
            iconSize: [34, 34],
            popupAnchor: [0, -17]
        });
    }

    function loadData(items, mode) {
        // Eski markerları temizle
        if (currentMarkers.length) {
            currentMarkers.forEach(m => map.removeLayer(m));
            currentMarkers = [];
        }
        const icon = getIcon(mode);
        const listeDiv = document.getElementById('hikayeListesi');
        listeDiv.innerHTML = "";

        items.forEach((item, idx) => {
            const coord = sehirMerkezleri[item.sehir];
            if (!coord) {
                console.warn("Şehir koordinatı bulunamadı:", item.sehir);
                return;
            }
            const konum = jitterCoord(coord, idx);
            const biyografi = yazarBiyografi[item.yazar] || "Yazar hakkında bilgi yok.";
            const yilStr = mode === "roman" ? ` · ${item.yil}` : "";
            const popupContent = `
                <div class="popup-title">📖 ${item.baslik}</div>
                <div><strong>Özet:</strong> ${item.ozet}</div>
                <div class="popup-biyografi"><strong>✍️ ${item.yazar}</strong><br>${biyografi}</div>
                <div style="font-size:0.7rem; margin-top:5px;">📍 ${item.sehir}${yilStr}</div>
            `;
            const marker = L.marker(konum, { icon: icon })
                .bindPopup(popupContent, { maxWidth: 300, className: "custom-popup" })
                .addTo(map);
            currentMarkers.push(marker);

            // Panel kartı oluştur
            const kart = document.createElement('div');
            kart.className = 'hikaye-karti';
            kart.innerHTML = `
                <div class="hikaye-baslik">${item.baslik}</div>
                <div class="hikaye-ozet">${item.ozet.substring(0, 80)}...</div>
                <div style="font-size:0.65rem; margin-top:5px;">📍 ${item.sehir} · ${item.yazar}</div>
            `;
            kart.addEventListener('click', () => {
                map.setView(konum, 12);
                marker.openPopup();
            });
            listeDiv.appendChild(kart);
        });

        document.getElementById('panelBaslik').innerHTML = mode === "hikaye" ? "📖 Hikayeler" : "📕 Romanlar";
        // Haritayı yeniden boyutlandır (görünüm düzeltmesi)
        setTimeout(() => { map.invalidateSize(); }, 50);
    }

    function filterData(searchTerm) {
        if (!searchTerm) return currentData;
        const term = searchTerm.toLowerCase();
        return currentData.filter(item =>
            item.baslik.toLowerCase().includes(term) ||
            item.yazar.toLowerCase().includes(term) ||
            item.sehir.toLowerCase().includes(term)
        );
    }

    function refreshDisplay() {
        const searchTerm = document.getElementById('aramaInput').value;
        const filtered = filterData(searchTerm);
        loadData(filtered, currentMode);
    }

    function switchMode(mode) {
        currentMode = mode;
        currentData = mode === "hikaye" ? hikayeler : romanlar;
        initMap();
        refreshDisplay();
    }

    // ---------------------- OLAY DİNLEYİCİLER ----------------------
    document.getElementById('hikayeSec').addEventListener('click', () => {
        switchMode('hikaye');
        document.getElementById('secimEkrani').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('secimEkrani').style.display = 'none';
            document.getElementById('appContainer').style.opacity = '1';
        }, 400);
    });

    document.getElementById('romanSec').addEventListener('click', () => {
        switchMode('roman');
        document.getElementById('secimEkrani').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('secimEkrani').style.display = 'none';
            document.getElementById('appContainer').style.opacity = '1';
        }, 400);
    });

    document.getElementById('anaMenuBtn').addEventListener('click', () => {
        document.getElementById('appContainer').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('secimEkrani').style.display = 'flex';
            document.getElementById('secimEkrani').style.opacity = '1';
            if (map) map.remove();
        }, 400);
    });

    document.getElementById('aramaInput').addEventListener('input', refreshDisplay);

    // Başlangıçta hiçbir şey gözükmez, seçim ekranı açık
    document.getElementById('appContainer').style.opacity = '0';
</script>
</body>
</html>
