    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e2a2e;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        /* Harita alanı */
        #harita {
            flex: 3;
            height: 100vh;
            z-index: 1;
        }
        /* Yan panel */
        .panel {
            flex: 1;
            background: #0f1720;
            color: #f0f0f0;
            overflow-y: auto;
            padding: 20px 12px;
            box-shadow: -4px 0 20px rgba(0,0,0,0.5);
            z-index: 2;
            border-left: 1px solid #ffb347;
        }
        .panel h2 {
            font-size: 1.4rem;
            margin-bottom: 15px;
            border-bottom: 2px solid #ffb347;
            display: inline-block;
            padding-bottom: 5px;
            color: #ffb347;
        }
        .panel p.desc {
            font-size: 0.75rem;
            color: #aaa;
            margin-bottom: 20px;
        }
        .hikaye-listesi {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .hikaye-karti {
            background: #1e2a32;
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 4px solid #ffb347;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .hikaye-karti:hover {
            background: #2a3a44;
            transform: translateX(5px);
        }
        .hikaye-baslik {
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 6px;
            color: #ffb347;
        }
        .hikaye-ozet {
            font-size: 0.7rem;
            color: #ccc;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .hikaye-sehir {
            font-size: 0.65rem;
            margin-top: 6px;
            color: #88c0ff;
            font-style: italic;
        }
        @media (max-width: 800px) {
            .panel { flex: 1.2; }
            .hikaye-baslik { font-size: 0.8rem; }
        }
        @media (max-width: 600px) {
            body { flex-direction: column; }
            .panel { height: 35vh; flex: none; }
            #harita { height: 65vh; }
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f1720;
        }
        ::-webkit-scrollbar-thumb {
            background: #ffb347;
            border-radius: 10px;
        }
        .custom-popup .leaflet-popup-content-wrapper {
            background: #1e2a32;
            color: #f0f0f0;
            border-radius: 12px;
            border-left: 4px solid #ffb347;
        }
        .custom-popup .leaflet-popup-tip {
            background: #1e2a32;
        }
        .popup-title {
            font-size: 1rem;
            font-weight: bold;
            color: #ffb347;
            margin-bottom: 6px;
        }
        .popup-summary {
            font-size: 0.8rem;
            line-height: 1.4;
        }
        .popup-meta {
            font-size: 0.7rem;
            color: #aaa;
            margin-top: 8px;
        }
    </style>

    hikayeler.push({ baslik: "102) Deniz Kenarında", ozet: "Muğla’da gün batımı izlemek.", sehir: "Muğla", yazar: "Mehmet Yıldız" });
    hikayeler.push({ baslik: "103) Bağ Bozumu", ozet: "Manisa’da üzüm hasadı, eğlence.", sehir: "Manisa", yazar: "Hasan Koç" });
    hikayeler.push({ baslik: "104) Kahvaltı Sofrası", ozet: "Aydın’da uzun kahvaltı, sohbet.", sehir: "Aydın", yazar: "Elif Arslan" });
    hikayeler.push({ baslik: "105) Yazlık Ev", ozet: "İzmir’de tatil, oyunlar, deniz.", sehir: "İzmir", yazar: "Kerem Demir" });
    hikayeler.push({ baslik: "106) Balıkçı Kasabası", ozet: "Balıkesir’de balıkçı ailesi dayanışması.", sehir: "Balıkesir", yazar: "Ali Yılmaz" });
    hikayeler.push({ baslik: "107) Lavanta Kokusu", ozet: "Isparta’da lavanta tarlasında çalışma.", sehir: "Isparta", yazar: "Zeynep Kaya" });
    hikayeler.push({ baslik: "108) Köy Düğünü", ozet: "Denizli’de düğün, akraba buluşması.", sehir: "Denizli", yazar: "Murat Arslan" });
    hikayeler.push({ baslik: "109) Akşamüstü Çayı", ozet: "İzmir’de her gün çay saati.", sehir: "İzmir", yazar: "Dilan Yıldız" });
    hikayeler.push({ baslik: "110) Birlikte Tamir", ozet: "Muğla’da tekne tamiri, ortak çaba.", sehir: "Muğla", yazar: "Emre Arslan" });

    // Toplam kontrol: 20+28+20+20 = 88 evet. (61-80:20, 1-28:28, klasik:20, 91-110:20 = 88)

    // --------------------------------------------------------------
    // 3) Her hikaye için rastgele küçük kaydırma (jitter) ile farklı konum
    // --------------------------------------------------------------
    function jitterCoord(coord, sehirAdi, index) {
        // Aynı şehirdeki hikayelerin birbirinden ayrılması için index'e göre deterministik kayma da yapabiliriz,
        // ama rastgele de olabilir. Daha düzenli görünmesi için index bazlı küçük kaydırma.
        // 0.01 derece ~ 1km, 0.03 ~ 3km.
        const latJitter = (Math.sin(index * 12.34) * 0.03) + (Math.cos(index * 7.89) * 0.02);
        const lngJitter = (Math.cos(index * 23.45) * 0.03) + (Math.sin(index * 9.87) * 0.02);
        return [coord[0] + latJitter, coord[1] + lngJitter];
    }

    // --------------------------------------------------------------
    // 4) Haritayı kur
    // --------------------------------------------------------------
    const map = L.map('harita').setView([39.0, 35.0], 6);
    
    // Canlı renkli harita (OpenStreetMap standart)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 18,
        minZoom: 4
    }).addTo(map);

    // Türkiye sınırları (yaklaşık)
    const turkiyeBounds = [[35.5, 25.5], [42.5, 45.0]]; // güneybatı, kuzeydoğu
    map.setMaxBounds(turkiyeBounds);
    map.on('drag', function() {
        map.panInsideBounds(turkiyeBounds, { animate: false });
    });

    // Marker Cluster grubu
    const markers = L.markerClusterGroup({
        chunkedLoading: true,
        spiderfyOnMaxZoom: true,
        showCoverageOnHover: false,
        maxClusterRadius: 40
    });

    // Marker'ları ve panel listesini oluştur
    const markerReferanslari = []; // her hikaye için marker ve bilgi
    const listeDiv = document.getElementById('hikayeListesi');

    hikayeler.forEach((hikaye, idx) => {
        let cityKey = hikaye.sehir;
        if (cityKey === "Çukurova") cityKey = "Adana";
        const merkez = sehirMerkezleri[cityKey];
        if (merkez) {
            // Her hikaye için kendine özel konum (jitter)
            const konum = jitterCoord(merkez, cityKey, idx);
            const popupHtml = `
                <div class="popup-title">📖 ${hikaye.baslik}</div>
                <div class="popup-summary">${hikaye.ozet}</div>
                <div class="popup-meta">📍 ${hikaye.sehir} · ✍️ ${hikaye.yazar}</div>
            `;
            const marker = L.marker(konum, {
                title: hikaye.baslik,
                riseOnHover: true
            });
            marker.bindPopup(popupHtml, { className: 'custom-popup', maxWidth: 280 });
            markers.addLayer(marker);
            
            // Panel için kart oluştur
            const kart = document.createElement('div');
            kart.className = 'hikaye-karti';
            kart.innerHTML = `
                <div class="hikaye-baslik">${hikaye.baslik}</div>
                <div class="hikaye-ozet">${hikaye.ozet.substring(0, 90)}${hikaye.ozet.length > 90 ? '...' : ''}</div>
                <div class="hikaye-sehir">📍 ${hikaye.sehir} · ${hikaye.yazar}</div>
            `;
            kart.addEventListener('click', () => {
                // Haritada o marker'a git ve popup aç
                map.setView(konum, 12);
                marker.openPopup();
                // Ayrıca kartı vurgula
                document.querySelectorAll('.hikaye-karti').forEach(k => k.style.background = '#1e2a32');
                kart.style.background = '#2a5a6e';
                setTimeout(() => {
                    kart.style.background = '#1e2a32';
                }, 1500);
            });
            listeDiv.appendChild(kart);
            
            markerReferanslari.push({ marker, konum, baslik: hikaye.baslik });
        } else {
            console.warn("Koordinat bulunamadı:", hikaye.sehir, hikaye.baslik);
        }
    });

    map.addLayer(markers);
    
    // Cluster tıklamada örümcek ağı
    markers.on('clusterclick', function (a) {
        a.layer.spiderfy();
    });

    // Ufak bir bilgi notu
    console.log(`${hikayeler.length} hikaye yüklendi, her biri kendi noktasında.`);
</script>
</body>
</html>
