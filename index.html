    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #0a1a1f;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        #harita {
            flex: 3;
            height: 100vh;
            z-index: 1;
        }
        .panel {
            flex: 1;
            background: #0f1a24;
            color: #eef4ff;
            overflow-y: auto;
            padding: 20px 12px;
            box-shadow: -4px 0 20px rgba(0,0,0,0.6);
            z-index: 2;
            border-left: 3px solid #ff9f4a;
        }
        .panel h2 {
            font-size: 1.4rem;
            margin-bottom: 8px;
            border-bottom: 2px solid #ff9f4a;
            display: inline-block;
            padding-bottom: 5px;
            color: #ff9f4a;
        }
        .panel p.desc {
            font-size: 0.75rem;
            color: #aac8e0;
            margin-bottom: 20px;
            margin-top: 8px;
        }
        .hikaye-listesi {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .hikaye-karti {
            background: #1e2e3b;
            border-radius: 14px;
            padding: 10px 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 4px solid #ff9f4a;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .hikaye-karti:hover {
            background: #2a4455;
            transform: translateX(4px);
        }
        .hikaye-baslik {
            font-weight: bold;
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: #ffb86b;
        }
        .hikaye-ozet {
            font-size: 0.7rem;
            color: #cddcec;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .hikaye-sehir {
            font-size: 0.65rem;
            margin-top: 6px;
            color: #7fc9ff;
            font-style: italic;
        }
        .kirmizi-halka {
            background: transparent;
            border: 4px solid #ff3333;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.2);
            transition: all 0.1s ease;
        }
        .kirmizi-halka:hover {
            transform: scale(1.1);
            border-width: 5px;
        }
        @media (max-width: 800px) {
            .panel { flex: 1.3; }
            .hikaye-baslik { font-size: 0.75rem; }
        }
        @media (max-width: 600px) {
            body { flex-direction: column; }
            .panel { height: 38vh; flex: none; }
            #harita { height: 62vh; }
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0f1a24; }
        ::-webkit-scrollbar-thumb { background: #ff9f4a; border-radius: 10px; }
        .custom-popup .leaflet-popup-content-wrapper {
            background: #1e2e3b;
            color: #f0f0f0;
            border-radius: 16px;
            border-left: 4px solid #ff9f4a;
        }
        .custom-popup .leaflet-popup-tip { background: #1e2e3b; }
        .popup-title {
            font-size: 1rem;
            font-weight: bold;
            color: #ffb86b;
            margin-bottom: 6px;
        }
        .popup-summary { font-size: 0.8rem; line-height: 1.4; }
        .popup-meta { font-size: 0.7rem; color: #aaa; margin-top: 8px; }
    </style>
</head>

    tumHikayeler.push({ baslik: "108) Köy Düğünü", ozet: "Denizli’de düğün, akraba buluşması.", sehir: "Denizli", yazar: "Murat Arslan" });
    tumHikayeler.push({ baslik: "109) Akşamüstü Çayı", ozet: "İzmir’de her gün çay saati.", sehir: "İzmir", yazar: "Dilan Yıldız" });
    tumHikayeler.push({ baslik: "110) Birlikte Tamir", ozet: "Muğla’da tekne tamiri, ortak çaba.", sehir: "Muğla", yazar: "Emre Arslan" });

    // ===================== 2) İÇ ANADOLU İÇİN YENİ HİKAYELER (29'dan 40'a kadar) =====================
    tumHikayeler.push({ baslik: "29) Bozkırda Bir Sabah", ozet: "Konya'nın bozkırında yaşayan bir aile, sabahın erken saatlerinde tarlaya gider. Birlikte çalışarak hem ekmek parası kazanır hem de bağlarını güçlendirirler.", sehir: "Konya", yazar: "Mehmet Taş" });
    tumHikayeler.push({ baslik: "30) Peri Bacalarının Gölgesinde", ozet: "Nevşehir'de bir aile, peri bacaları arasında yaptıkları piknikte eski günleri anar. Çocuklara bölgenin tarihini ve aile büyüklerini tanıtırlar.", sehir: "Nevşehir", yazar: "Ayşe Kaymak" });
    tumHikayeler.push({ baslik: "31) Ankara'nın İlk Karı", ozet: "Başkentte yaşayan bir aile, yılın ilk karında evde toplanır, birlikte kestane pişirir ve sohbet eder. Küçük anılar büyük mutluluklar yaratır.", sehir: "Ankara", yazar: "Caner Yılmaz" });

    tumHikayeler.push({ baslik: "33) Kırşehir'de Cuma Sohbetleri", ozet: "Kırşehir'de dede, torunlarına her cuma akşamı eski aile hikayelerini anlatır. Bu sohbetler sayesinde nesiller arası bağ kuvvetlenir.", sehir: "Kırşehir", yazar: "Hasan Kılıç" });
    tumHikayeler.push({ baslik: "34) Aksaray'da Bağ Bozumu", ozet: "Aksaray'da aile birlikte üzüm bağlarında çalışır. Çocuklar da yardım edince işler erken biter ve akşam hep birlikte şarkılar söylerler.", sehir: "Aksaray", yazar: "Gülseren Ak" });

    tumHikayeler.push({ baslik: "38) Yozgat'ın Soğuk Kışı", ozet: "Yozgat'ın çetin kışında aile, sobayı yakar, birlikte kışlık erişe keser. Dışarıda tipi varken içerisi sıcak ve samimidir.", sehir: "Yozgat", yazar: "Sema Yüksel" });

    tumHikayeler.push({ baslik: "41) Kırıkkale'de Fabrika İşçileri", ozet: "Kırıkkale'de bir işçi ailesi, babalarının fabrikada kazandığı ekmekle geçinir. Çocuklar birlikte ders çalışır, anneleri onlara destek olur.", sehir: "Kırıkkale", yazar: "Nesrin Gök" });

    // Toplam şu an: 20(61-80) +28(1-28) +20(klasik) +20(91-110) +13 (İç Anadolu 29-41) = 101 hikaye.
    // Hadi 100'e tamamlamak için bir tane daha ekleyelim (42)
    tumHikayeler.push({ baslik: "42) Konya'nın Mevlana Sohbetleri", ozet: "Konya'da bir aile, Mevlana müzesini ziyaret eder, ardından evde sema gösterisi yaparlar. Manevi bağları kuvvetlenir.", sehir: "Konya", yazar: "Rıza Terzi" });

    // Şimdi hikayeleri numaraya göre sırala (önceki sistem)
    function extractNumber(title) {
        const match = title.match(/^(\d+)\)/);
        if (match) return parseInt(match[1], 10);
        return 9999; // numarasız klasikler sona
    }
    tumHikayeler.sort((a, b) => extractNumber(a.baslik) - extractNumber(b.baslik));

    // Jitter (her hikaye ayrı nokta)
    function jitterCoord(coord, idx) {
        const latJ = (Math.sin(idx * 12.34) * 0.025) + (Math.cos(idx * 7.89) * 0.015);
        const lngJ = (Math.cos(idx * 23.45) * 0.025) + (Math.sin(idx * 9.87) * 0.015);
        return [coord[0] + latJ, coord[1] + lngJ];
    }

    // Harita kurulumu
    const map = L.map('harita').setView([39.5, 33.5], 6); // İç Anadolu daha görünür
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap & CartoDB',
        maxZoom: 18, minZoom: 5
    }).addTo(map);

    const turkiyeBounds = [[35.5, 25.5], [42.5, 45.0]];
    map.setMaxBounds(turkiyeBounds);
    map.on('drag', () => map.panInsideBounds(turkiyeBounds, { animate: false }));

    // Kırmızı halka ikon
    const halkaIkon = L.divIcon({
        html: '<div style="width:28px; height:28px;"></div>',
        className: 'kirmizi-halka',
        iconSize: [28, 28],
        popupAnchor: [0, -14]
    });

    const listeDiv = document.getElementById('hikayeListesi');
    listeDiv.innerHTML = '';

    tumHikayeler.forEach((hik, idx) => {
        let city = hik.sehir;
        if (city === "Çukurova") city = "Adana";
        const merkez = sehirMerkezleri[city];
        if (!merkez) {
            console.warn("Koordinat yok:", city);
            return;
        }
        const konum = jitterCoord(merkez, idx);
        const popupHtml = `
            <div class="popup-title">📖 ${hik.baslik}</div>
            <div class="popup-summary">${hik.ozet}</div>
            <div class="popup-meta">📍 ${hik.sehir} · ✍️ ${hik.yazar}</div>
        `;
        const marker = L.marker(konum, { icon: halkaIkon, title: hik.baslik })
            .bindPopup(popupHtml, { className: 'custom-popup', maxWidth: 280 })
            .addTo(map);

        const kart = document.createElement('div');
        kart.className = 'hikaye-karti';
        kart.innerHTML = `
            <div class="hikaye-baslik">${hik.baslik}</div>
            <div class="hikaye-ozet">${hik.ozet.substring(0, 90)}${hik.ozet.length > 90 ? '...' : ''}</div>
            <div class="hikaye-sehir">📍 ${hik.sehir} · ${hik.yazar}</div>
        `;
        kart.addEventListener('click', () => {
            map.setView(konum, 12);
            marker.openPopup();
            kart.style.background = '#2a6b7c';
            setTimeout(() => kart.style.background = '#1e2e3b', 1000);
        });
        listeDiv.appendChild(kart);
    });

    console.log(`${tumHikayeler.length} hikaye yüklendi. İç Anadolu eklendi.`);
</script>
