<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFK Edebiyat Atlası</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #fdfaf1; color: #333; }
        #welcome-screen {
            position: absolute; width: 100%; height: 100%; 
            background: radial-gradient(circle, #fdfaf1 0%, #e6e2d3 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        .start-btn {
            padding: 18px 50px; font-size: 22px; cursor: pointer;
            border: 2px solid #d4a373; background: white; color: #d4a373; 
            border-radius: 15px; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .start-btn:hover { background: #d4a373; color: white; transform: scale(1.05); }
        #map { height: 100vh; width: 100%; display: none; }
        
        .city-popup { min-width: 280px; max-height: 450px; overflow-y: auto; padding: 10px; }
        .city-popup h2 { color: #d4a373; border-bottom: 2px solid #d4a373; margin: 0 0 10px 0; font-size: 20px; }
        .eser-item { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .eser-item:last-child { border: none; }
        .eser-baslik { font-weight: bold; color: #2c3e50; font-size: 16px; }
        .eser-yazar { font-style: italic; font-size: 13px; color: #7f8c8d; display: block; margin-bottom: 3px; }
        .eser-ozet { font-size: 13px; color: #555; line-height: 1.4; }
        .tur-etiket { font-size: 10px; padding: 2px 6px; border-radius: 4px; color: white; margin-left: 5px; vertical-align: middle; }
        .hikaye-bg { background: #27ae60; }
        .roman-bg { background: #2980b9; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1 style="color:#2c3e50; font-size: 42px;">NFK EDEBİYAT ATLASI</h1>
        <p style="color:#7f8c8d; margin-bottom:30px;">Tüm Hikaye ve Romanlar Tek Haritada</p>
        <button class="start-btn" onclick="startApp()">PROJEYİ BAŞLAT</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map;
        
        // Şehir bazlı tam liste (Eksiksiz!)

            ]},
            "Mersin": { koord: [36.81, 34.63], eserler: [
                { ad: "Annenin Eli", yazar: "Fatma Yıldız", tur: "Hikaye", ozet: "Annenin fedakârlığının ailedeki önemi." },
                { ad: "Eller Birleşince", yazar: "Kerem Yılmaz", tur: "Hikaye", ozet: "Ailece çözülen sorunlar." },

                { ad: "Kağnı", yazar: "Sabahattin Ali", tur: "Hikaye", ozet: "Yoksul annenin çocuğu için mücadelesi." },
                { ad: "Ayran", yazar: "Sabahattin Ali", tur: "Hikaye", ozet: "Sorumluluk alan bir çocuğun aile sevgisi." },

            ]},
            "Osmaniye": { koord: [37.07, 36.24], eserler: [

            ]},
            "Eskişehir": { koord: [39.77, 30.52], eserler: [
                { ad: "Yaban", yazar: "Yakup Kadri", tur: "Roman", ozet: "Aydın-köylü çatışması ve vatan gerçeği." }
            ]},
            "Ankara": { koord: [39.93, 32.85], eserler: [
                { ad: "Ateşten Gömlek", yazar: "Halide Edib", tur: "Roman", ozet: "Kurtuluş Savaşı'nda vatan ve aile sevgisi." },
                { ad: "Eskici", yazar: "Refik Halit Karay", tur: "Hikaye", ozet: "Gurbetteki çocuğun vatan ve aile özlemi." }
            ]},
            "Bursa": { koord: [40.18, 29.06], eserler: [
                { ad: "Oğlumuz", yazar: "Tarık Buğra", tur: "Hikaye", ozet: "Anne-babanın evlat sevgisi ve fedakârlığı." },
                { ad: "Çalıkuşu", yazar: "Reşat Nuri", tur: "Roman", ozet: "Feride'nin Anadolu'daki öğretmenlik mücadelesi." }
            ]}
        };

        function startApp() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('map').style.display = 'block';

            map = L.map('map', {
                center: [38.96, 35.24],
                zoom: 6,
                minZoom: 6,
                maxBounds: [[33.0, 24.0], [44.0, 46.0]],
                maxBoundsViscosity: 1.0
            });

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            for (var sehir in sehirVerileri) {
                var data = sehirVerileri[sehir];
                var popupIcerik = `<div class="city-popup"><h2>${sehir}</h2>`;
                data.eserler.forEach(function(eser) {
                    var turClass = eser.tur === "Hikaye" ? "hikaye-bg" : "roman-bg";
                    popupIcerik += `
                        <div class="eser-item">
                            <span class="eser-baslik">${eser.ad} <span class="tur-etiket ${turClass}">${eser.tur}</span></span>
                            <span class="eser-yazar">${eser.yazar}</span>
                            <span class="eser-ozet"><b>Özet:</b> ${eser.ozet}</span>
                        </div>`;
                });
                popupIcerik += `</div>`;
                L.marker(data.koord).addTo(map).bindPopup(popupIcerik);
            }
        }
    </script>
</body>
</html>
