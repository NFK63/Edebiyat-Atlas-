<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Edebiyat Atlası - Hikayeler ve Romanlar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: #0a1a1f;
            height: 100vh;
            overflow: hidden;
        }
        .app-container {
            display: flex;
            height: 100vh;
            width: 100%;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #harita {
            flex: 3;
            height: 100vh;
        }
        .panel {
            flex: 1;
            background: #0f1a24;
            color: #eef4ff;
            overflow-y: auto;
            padding: 20px 12px;
            box-shadow: -4px 0 20px rgba(0,0,0,0.6);
            border-left: 3px solid #ff9f4a;
        }
        .panel h2 {
            font-size: 1.4rem;
            margin-bottom: 8px;
            border-bottom: 2px solid #ff9f4a;
            display: inline-block;
            padding-bottom: 5px;
            color: #ff9f4a;
        }
        .panel p.desc {
            font-size: 0.75rem;
            color: #aac8e0;
            margin-bottom: 20px;
            margin-top: 8px;
        }
        .hikaye-listesi {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .hikaye-karti {
            background: #1e2e3b;
            border-radius: 14px;
            padding: 10px 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 4px solid #ff9f4a;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .hikaye-karti:hover {
            background: #2a4455;
            transform: translateX(4px);
        }
        .hikaye-baslik {
            font-weight: bold;
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: #ffb86b;
        }
        .hikaye-ozet {
            font-size: 0.7rem;
            color: #cddcec;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .hikaye-sehir {
            font-size: 0.65rem;
            margin-top: 6px;
            color: #7fc9ff;
            font-style: italic;
        }
        .kirmizi-halka {
            background: transparent;
            border: 4px solid #ff3333;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.2);
            transition: all 0.1s ease;
        }
        .mavi-halka {
            background: transparent;
            border: 4px solid #3399ff;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.2);
            transition: all 0.1s ease;
        }
        .kirmizi-halka:hover, .mavi-halka:hover {
            transform: scale(1.1);
            border-width: 5px;
        }
        .secim-ekrani {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a1a1f;
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            transition: opacity 0.5s ease;
        }
        .secim-kutusu {
            background: #0f1a24;
            padding: 40px 50px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid #ff9f4a;
            max-width: 90%;
        }
        .secim-kutusu h1 {
            color: #ffb86b;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .secim-kutusu p {
            color: #aac8e0;
            margin-bottom: 30px;
            font-size: 1rem;
        }
        .secim-butonlari {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .secim-butonu {
            background: #1e2e3b;
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #eef4ff;
            border-left: 4px solid;
        }
        .secim-butonu:first-child {
            border-color: #ff3333;
        }
        .secim-butonu:last-child {
            border-color: #3399ff;
        }
        .secim-butonu:hover {
            transform: scale(1.05);
            background: #2a4455;
        }
        @media (max-width: 600px) {
            .secim-butonlari { gap: 15px; }
            .secim-butonu { padding: 10px 20px; font-size: 1rem; }
            .secim-kutusu { padding: 25px 30px; }
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0f1a24; }
        ::-webkit-scrollbar-thumb { background: #ff9f4a; border-radius: 10px; }
        .custom-popup .leaflet-popup-content-wrapper {
            background: #1e2e3b;
            color: #f0f0f0;
            border-radius: 16px;
            border-left: 4px solid #ff9f4a;
        }
        .custom-popup .leaflet-popup-tip { background: #1e2e3b; }
        .popup-title {
            font-size: 1rem;
            font-weight: bold;
            color: #ffb86b;
            margin-bottom: 6px;
        }
        .popup-summary { font-size: 0.8rem; line-height: 1.4; }
        .popup-meta { font-size: 0.7rem; color: #aaa; margin-top: 8px; }
    </style>
</head>

        <div class="secim-butonlari">

    // --------------------------------------------------------------
    // Jitter fonksiyonu (her nokta farklı)
    // --------------------------------------------------------------
    function jitterCoord(coord, idx) {
        const latJ = (Math.sin(idx * 12.34) * 0.025) + (Math.cos(idx * 7.89) * 0.015);
        const lngJ = (Math.cos(idx * 23.45) * 0.025) + (Math.sin(idx * 9.87) * 0.015);
        return [coord[0] + latJ, coord[1] + lngJ];
    }

    // Global değişkenler
    let map, currentMarkers = [];

    function initMap() {
        if (map) map.remove();
        map = L.map('harita').setView([39.5, 33.5], 6);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap & CartoDB',
            maxZoom: 18, minZoom: 5
        }).addTo(map);
        const turkiyeBounds = [[35.5, 25.5], [42.5, 45.0]];
        map.setMaxBounds(turkiyeBounds);
        map.on('drag', () => map.panInsideBounds(turkiyeBounds, { animate: false }));
    }

    function getIcon(tur) {
        const className = tur === 'hikaye' ? 'kirmizi-halka' : 'mavi-halka';
        return L.divIcon({
            html: '<div style="width:28px; height:28px;"></div>',
            className: className,
            iconSize: [28, 28],
            popupAnchor: [0, -14]
        });
    }

    function loadData(items, mode) {
        if (currentMarkers.length) {
            currentMarkers.forEach(m => map.removeLayer(m));
            currentMarkers = [];
        }
        const icon = getIcon(mode);
        const listeDiv = document.getElementById('hikayeListesi');
        listeDiv.innerHTML = '';
        
        items.forEach((item, idx) => {
            let city = item.sehir;
            if (city === "Çukurova") city = "Adana";
            const merkez = sehirMerkezleri[city];
            if (!merkez) return;
            const konum = jitterCoord(merkez, idx);
            const ekstra = mode === 'roman' ? ` · ${item.yil}` : '';
            const popupHtml = `
                <div class="popup-title">📖 ${item.baslik}</div>
                <div class="popup-summary">${item.ozet}</div>
                <div class="popup-meta">📍 ${item.sehir} · ✍️ ${item.yazar}${ekstra}</div>
            `;
            const marker = L.marker(konum, { icon: icon, title: item.baslik })
                .bindPopup(popupHtml, { className: 'custom-popup', maxWidth: 280 })
                .addTo(map);
            currentMarkers.push(marker);

            const kart = document.createElement('div');
            kart.className = 'hikaye-karti';
            kart.innerHTML = `
                <div class="hikaye-baslik">${item.baslik}</div>
                <div class="hikaye-ozet">${item.ozet.substring(0, 90)}${item.ozet.length > 90 ? '...' : ''}</div>
                <div class="hikaye-sehir">📍 ${item.sehir} · ${item.yazar}</div>
            `;
            kart.addEventListener('click', () => {
                map.setView(konum, 12);
                marker.openPopup();
                kart.style.background = '#2a6b7c';
                setTimeout(() => kart.style.background = '#1e2e3b', 1000);
            });
            listeDiv.appendChild(kart);
        });
        document.getElementById('panelBaslik').innerHTML = mode === 'hikaye' ? '📖 Hikayeler' : '📕 Romanlar';
        document.getElementById('panelDesc').innerHTML = mode === 'hikaye' ? `${items.length} hikaye · Kırmızı halka` : `${items.length} roman · Mavi halka`;
    }

    function selectMode(mode) {
        initMap();
        if (mode === 'hikaye') loadData(hikayeler, 'hikaye');
        else loadData(romanlar, 'roman');
        document.getElementById('secimEkrani').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('secimEkrani').style.display = 'none';
            document.getElementById('appContainer').style.opacity = '1';
        }, 500);
    }

    document.getElementById('hikayeSec').addEventListener('click', () => selectMode('hikaye'));
    document.getElementById('romanSec').addEventListener('click', () => selectMode('roman'));

    document.getElementById('appContainer').style.opacity = '0';
</script>
