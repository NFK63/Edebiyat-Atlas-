let map,currentMarkers=[],currentMode="hikaye",currentData=[];
function initMap(){if(map)map.remove();map=L.map('harita').setView([39.5,33.5],6);L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'CartoDB',minZoom:5,maxZoom:18}).addTo(map);map.setMaxBounds([[35.5,25.5],[42.5,45.0]]);map.on('drag',()=>map.panInsideBounds([[35.5,25.5],[42.5,45.0]],{animate:false}));}
function getIcon(mode){const c=mode==='hikaye'?'#ff3333':'#3399ff';return L.divIcon({html:`<div style="width:34px;height:34px;background:${c};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid white;">${mode==='hikaye'?'📖':'📕'}</div>`,iconSize:[34,34],popupAnchor:[0,-17]});}
function loadData(items,mode){if(currentMarkers.length)currentMarkers.forEach(m=>map.removeLayer(m));currentMarkers=[];const icon=getIcon(mode);const liste=document.getElementById('hikayeListesi');liste.innerHTML='';items.forEach((item,idx)=>{const coord=item.koordinat;if(!coord)return;const popup=`<div class="popup-title">${item.baslik}</div><div>${item.ozet}</div><div><strong>${item.yazar}</strong><br>${item.biyografi||''}</div><div>📍 ${item.sehir}</div>`;const marker=L.marker(coord,{icon}).bindPopup(popup,{className:'custom-popup'}).addTo(map);currentMarkers.push(marker);const kart=document.createElement('div');kart.className='hikaye-karti';kart.innerHTML=`<div class="hikaye-baslik">${item.baslik}</div><div>${item.ozet.substring(0,80)}...</div><div>${item.sehir} · ${item.yazar}</div>`;kart.onclick=()=>{map.setView(coord,12);marker.openPopup();};liste.appendChild(kart);});document.getElementById('panelBaslik').innerHTML=mode==='hikaye'?'📖 Hikayeler':'📕 Romanlar';setTimeout(()=>map.invalidateSize(),100);}
function filterData(term){if(!term)return currentData;const t=term.toLowerCase();return currentData.filter(i=>i.baslik.toLowerCase().includes(t)||i.yazar.toLowerCase().includes(t)||i.sehir.toLowerCase().includes(t));}
function refreshDisplay(){const filtered=filterData(document.getElementById('aramaInput').value);loadData(filtered,currentMode);}
function switchMode(mode){currentMode=mode;currentData=mode==='hikaye'?hikayeler:romanlar;initMap();refreshDisplay();document.getElementById('secimEkrani').style.display='none';document.getElementById('appContainer').style.opacity='1';}
document.getElementById('hikayeSec').onclick=()=>switchMode('hikaye');document.getElementById('romanSec').onclick=()=>switchMode('roman');document.getElementById('anaMenuBtn').onclick=()=>location.reload();document.getElementById('aramaInput').addEventListener('input',refreshDisplay);
</script>
