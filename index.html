<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Edebiyat Atlası - Test</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #0a1a1f; }
        #harita { flex: 3; }
        .panel { flex: 1; background: #0f1a24; color: white; overflow-y: auto; padding: 20px; border-left: 3px solid #ff9f4a; }
        .secim-ekrani { position: fixed; top:0; left:0; width:100%; height:100%; background:#0a1a1f; display:flex; align-items:center; justify-content:center; z-index:2000; }
        .secim-kutusu { background:#0f1a24; padding:40px; border-radius:40px; text-align:center; }
        .secim-butonu { background:#1e2e3b; border:none; padding:15px 35px; margin:10px; font-size:1.2rem; border-radius:60px; cursor:pointer; color:white; }
        .hikaye-karti { background:#1e2e3b; border-radius:12px; padding:10px; margin-bottom:10px; cursor:pointer; border-left:4px solid #ff9f4a; }
        .hikaye-baslik { font-weight:bold; color:#ffb86b; }
        .custom-popup .leaflet-popup-content-wrapper { background:#1e2e3b; color:#f0f0f0; border-radius:16px; }
        .popup-title { color:#ffb86b; font-weight:bold; }
        .hikaye-icon, .roman-icon { background:#ff3333; border-radius:50%; width:32px; height:32px; display:flex; align-items:center; justify-content:center; font-size:18px; border:2px solid white; }
        .roman-icon { background:#3399ff; }
    </style>
</head>
<body>
<div class="secim-ekrani" id="secimEkrani">
    <div class="secim-kutusu">
        <h1>📚 Edebiyat Atlası (Test)</h1>
        <button class="secim-butonu" id="hikayeSec">📖 Hikayeler</button>
        <button class="secim-butonu" id="romanSec">📕 Romanlar</button>
    </div>
</div>
<div id="harita"></div>
<div class="panel" id="panel">
    <h2 id="panelBaslik">Test</h2>
    <input type="text" id="arama" placeholder="Ara..." style="width:100%; padding:8px; margin-bottom:15px; border-radius:30px; border:none;">
    <div id="liste"></div>
</div>

<script>
    const sehirMerkezleri = { "İstanbul": [41.0082, 28.9784], "Ankara": [39.9334, 32.8597], "Adana": [37.0, 35.3213] };
    const yazarBiyografi = { "Test Yazar": "Test biyografi" };

    // Sadece 3 örnek hikaye (çalıştığını görmek için)
    const hikayeler = [
        { baslik: "Test Hikaye 1", ozet: "Bu bir test özetidir. Aile teması işlenir.", sehir: "İstanbul", yazar: "Test Yazar" },
        { baslik: "Test Hikaye 2", ozet: "İkinci test özeti.", sehir: "Ankara", yazar: "Test Yazar" }
    ];
    const romanlar = [
        { baslik: "Test Roman 1", ozet: "Roman özeti.", sehir: "Adana", yazar: "Test Yazar", yil: 2020 }
    ];

    let map, currentMarkers = [];

    function initMap() { if(map) map.remove(); map = L.map('harita').setView([39.5, 33.5], 6); L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: 'CartoDB' }).addTo(map); map.setMaxBounds([[35.5,25.5],[42.5,45.0]]); }
    function getIcon(mode) { return L.divIcon({ html: `<div style="width:32px;height:32px;background:${mode==='hikaye'?'#ff3333':'#3399ff'};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid white;">${mode==='hikaye'?'📖':'📕'}</div>`, iconSize: [32,32], popupAnchor: [0,-16] }); }
    function loadData(items, mode) {
        if(currentMarkers.length) currentMarkers.forEach(m=>map.removeLayer(m));
        currentMarkers = [];
        const icon = getIcon(mode);
        const listeDiv = document.getElementById('liste');
        listeDiv.innerHTML = '';
        items.forEach((item,idx)=>{
            const coord = sehirMerkezleri[item.sehir];
            if(!coord) return;
            const popupHtml = `<div class="popup-title">${item.baslik}</div><div>${item.ozet}</div><div>✍️ ${item.yazar}</div>`;
            const marker = L.marker(coord, {icon}).bindPopup(popupHtml, {className:'custom-popup'}).addTo(map);
            currentMarkers.push(marker);
            const kart = document.createElement('div');
            kart.className = 'hikaye-karti';
            kart.innerHTML = `<div class="hikaye-baslik">${item.baslik}</div><div>${item.ozet.substring(0,50)}...</div>`;
            kart.onclick = () => { map.setView(coord, 12); marker.openPopup(); };
            listeDiv.appendChild(kart);
        });
        document.getElementById('panelBaslik').innerHTML = mode === 'hikaye' ? '📖 Hikayeler' : '📕 Romanlar';
    }
    function selectMode(mode) {
        initMap();
        loadData(mode === 'hikaye' ? hikayeler : romanlar, mode);
        document.getElementById('secimEkrani').style.display = 'none';
    }
    document.getElementById('hikayeSec').onclick = () => selectMode('hikaye');
    document.getElementById('romanSec').onclick = () => selectMode('roman');
    document.getElementById('arama').addEventListener('input', (e)=>{
        const term = e.target.value.toLowerCase();
        const items = (document.getElementById('panelBaslik').innerHTML.includes('Hikaye') ? hikayeler : romanlar);
        const filtered = items.filter(i=> i.baslik.toLowerCase().includes(term) || i.sehir.toLowerCase().includes(term));
        loadData(filtered, document.getElementById('panelBaslik').innerHTML.includes('Hikaye') ? 'hikaye' : 'roman');
    });
</script>
</body>
</html>
