<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Edebiyat Atlası - Demo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #0a1a1f; }
        #harita { flex: 3; }
        .panel { flex: 1; background: #0f1a24; color: white; overflow-y: auto; padding: 20px; border-left: 3px solid #ff9f4a; }
        .hikaye-karti { background: #1e2e3b; border-radius: 12px; padding: 10px; margin-bottom: 10px; cursor: pointer; border-left: 4px solid #ff9f4a; }
        .kirmizi-halka { border: 4px solid #ff3333; border-radius: 50%; width: 28px; height: 28px; background: transparent; }
        .mavi-halka { border: 4px solid #3399ff; border-radius: 50%; width: 28px; height: 28px; background: transparent; }
        .custom-popup .leaflet-popup-content-wrapper { background: #1e2e3b; color: #f0f0f0; border-radius: 16px; }
        .popup-title { color: #ffb86b; font-weight: bold; font-size: 1rem; margin-bottom: 6px; }
        .popup-summary { font-size: 0.75rem; line-height: 1.4; margin-bottom: 8px; }
        .popup-biyografi { font-size: 0.7rem; color: #aaa; border-top: 1px solid #444; padding-top: 6px; margin-top: 6px; }
    </style>
</head>
<body>
<div id="harita"></div>
<div class="panel" id="panel">
    <h2>📖 Edebiyat Atlası</h2>
    <div id="hikayeListesi"></div>
</div>

<script>
    const sehirMerkezleri = {
        "Adana": [37.0, 35.3213], "İstanbul": [41.0082, 28.9784], "Van": [38.5012, 43.3730],
        "Ankara": [39.9334, 32.8597], "İzmir": [38.4192, 27.1287]
    };

    // ===================== YAZAR BİYOGRAFİLERİ =====================
    const yazarBiyografi = {
        "Emre Kaya": "1991 Adana doğumlu. Toplumsal konular ve aile bağlarını anlatan hikâyeler yazar. Yerel dergilerde öyküleri yayınlanmıştır.",
        "Sibel Yılmaz": "1988 Van doğumlu. Edebiyat eğitimi aldı. Van’ın sert doğası ve aile yaşamını işler. Modern anlatımıyla geleneksel değerleri harmanlar.",
        "Ömer Seyfettin": "1884-1920. Türk hikâyeciliğinin öncüsü, Milli Edebiyat akımının temsilcisi. Sade diliyle çocuk ve gençlik dünyasını anlatır.",
        "Yaşar Kemal": "1923-2015. Çukurovalı büyük yazar. Doğa, insan ve adalet temalarını işler. İnce Memed serisiyle dünya çapında ün kazanmıştır.",
        "Sabahattin Ali": "1907-1948. Toplumcu gerçekçi yazar. Kürk Mantolu Madonna, Kağnı, Ayran gibi eserleriyle tanınır."
    };

    // ===================== HİKAYELER (Uzun özetli ve aile temalı) =====================
    const hikayeler = [
        {
            baslik: "61) Birlikte Güçlüyüz",
            ozet: "Adana'nın sıcak yaz günlerinde, üç çocuklu bir aile maddi sıkıntılar içinde kıvranıyordu. Baba işsiz kalmış, anne evde küçük işlerle ailesini geçindirmeye çalışıyordu. En büyük çocuk olan 14 yaşındaki Ali, okuldan sonra çıraklık yaparak eve katkı sağlamaya başladı. Küçük kardeşler harçlıklarını biriktirip aile bütçesine destek oldu. Bir gece elektrikler kesildiğinde, tüm aile mum ışığında toplanıp birbirlerine sarıldı. Baba 'Ne olursa olsun, biz bir aileyiz' dedi. Bu zor günler, onları daha da kenetledi. Maddi sıkıntılar geçici, aile bağları kalıcıydı.",
            sehir: "Adana",
            yazar: "Emre Kaya"
        },
        {
            baslik: "1) Buzlu Dağların Sıcaklığı",
            ozet: "Van'ın dondurucu kışında kar fırtınası bastırdı. Ailenin en küçük üyesi 5 yaşındaki Zeynep hastalandı. Yollar kapanmış, hastaneye gitmek imkansızdı. Baba odun taşırken donma tehlikesi geçirdi. Anne evde kalan az unla ekmek yapmaya çalışıyordu. Komşular yardıma koştu: biri ateş düşürücü ilaç, diğeri battaniye getirdi. Gece boyunca aile nöbetleşe Zeynep'in başında bekledi. Sabah ateş düştü. Bu olay, ailenin sadece kendi içinde değil, mahalle dayanışmasıyla da ne kadar güçlü olduğunu gösterdi.",
            sehir: "Van",
            yazar: "Sibel Yılmaz"
        },
        {
            baslik: "Kaşağı – Ömer Seyfettin",
            ozet: "İki kardeş arasındaki kıskançlık ve yalanın yıkıcı sonuçları... Babasının kıymetli kaşağısını kıran büyük kardeş, suçu küçük kardeşe atar. Masum kardeş cezalandırılır. Suç ortaya çıktığında artık çok geçtir. Hikaye, aile içinde dürüstlüğün, güvenin ve kardeşlik bağlarının önemini vurgular. Bir yalan, sadece bir kişiyi değil, tüm ailenin huzurunu bozar.",
            sehir: "İstanbul",
            yazar: "Ömer Seyfettin"
        }
    ];

    // ===================== ROMANLAR =====================
    const romanlar = [
        {
            baslik: "İnce Memed",
            ozet: "Çukurova'da bir eşkıyanın halk için verdiği mücadele. Aile bağları ve toprak adaleti işlenir.",
            sehir: "Adana",
            yazar: "Yaşar Kemal",
            yil: 1955
        },
        {
            baslik: "Kuyucaklı Yusuf",
            ozet: "Bir yetimin zorlu hayatı ve aşkı. Aile kavramının sadece kan bağı değil, aidiyet duygusu olduğunu gösterir.",
            sehir: "İzmir",
            yazar: "Sabahattin Ali",
            yil: 1937
        }
    ];

    function jitterCoord(coord, idx) {
        return [coord[0] + Math.sin(idx) * 0.02, coord[1] + Math.cos(idx) * 0.02];
    }

    let map, currentMarkers = [];

    function initMap() {
        if (map) map.remove();
        map = L.map('harita').setView([39.0, 35.0], 6);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: 'CartoDB' }).addTo(map);
        map.setMaxBounds([[35.5, 25.5], [42.5, 45.0]]);
    }

    function getIcon(tur) {
        const cls = tur === 'hikaye' ? 'kirmizi-halka' : 'mavi-halka';
        return L.divIcon({ html: '<div style="width:28px;height:28px;"></div>', className: cls, iconSize: [28, 28] });
    }

    function loadData(items, mode) {
        if (currentMarkers.length) currentMarkers.forEach(m => map.removeLayer(m));
        currentMarkers = [];
        const icon = getIcon(mode);
        const listeDiv = document.getElementById('hikayeListesi');
        listeDiv.innerHTML = '';
        items.forEach((item, idx) => {
            const merkez = sehirMerkezleri[item.sehir];
            if (!merkez) return;
            const konum = jitterCoord(merkez, idx);
            const biyografi = yazarBiyografi[item.yazar] || "Yazar hakkında bilgi mevcut değil.";
            const popupHtml = `
                <div class="popup-title">📖 ${item.baslik}</div>
                <div class="popup-summary"><strong>Özet:</strong> ${item.ozet}</div>
                <div class="popup-biyografi"><strong>✍️ ${item.yazar}</strong><br>${biyografi}</div>
                <div class="popup-meta">📍 ${item.sehir} ${mode === 'roman' ? '· ' + item.yil : ''}</div>
            `;
            const marker = L.marker(konum, { icon }).bindPopup(popupHtml, { maxWidth: 350, className: 'custom-popup' }).addTo(map);
            currentMarkers.push(marker);
            const kart = document.createElement('div');
            kart.className = 'hikaye-karti';
            kart.innerHTML = `<strong>${item.baslik}</strong><br>${item.ozet.substring(0, 70)}...<br><span style="font-size:0.7rem;">✍️ ${item.yazar}</span>`;
            kart.addEventListener('click', () => { map.setView(konum, 12); marker.openPopup(); });
            listeDiv.appendChild(kart);
        });
    }

    initMap();
    loadData(hikayeler, 'hikaye');
    // Romanları görmek için loadData(romanlar, 'roman') yapabilirsin, ama seçim ekranı olmadığından şimdilik hikayeler gösteriliyor.
</script>
</body>
</html>
