<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Edebiyat Atlası - Hikayeler ve Romanlar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #0a1a1f; height: 100vh; overflow: hidden; }
        .app-container { display: flex; height: 100vh; width: 100%; opacity: 0; transition: opacity 0.5s ease; }
        #harita { flex: 3; height: 100vh; z-index: 1; }
        .panel { flex: 1; background: #0f1a24; color: #eef4ff; overflow-y: auto; padding: 20px 12px; box-shadow: -4px 0 20px rgba(0,0,0,0.6); border-left: 3px solid #ff9f4a; display: flex; flex-direction: column; z-index: 2; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .panel h2 { font-size: 1.4rem; border-bottom: 2px solid #ff9f4a; display: inline-block; padding-bottom: 5px; color: #ff9f4a; }
        .btn-ana-menu { background: #2a4455; border: none; padding: 6px 12px; border-radius: 30px; color: white; cursor: pointer; font-size: 0.75rem; transition: 0.2s; }
        .btn-ana-menu:hover { background: #ff9f4a; color: #0a1a1f; }
        .arama-kutusu { width: 100%; padding: 8px 12px; border-radius: 30px; border: none; background: #1e2e3b; color: white; margin-bottom: 15px; font-size: 0.8rem; }
        .hikaye-listesi { display: flex; flex-direction: column; gap: 10px; flex: 1; overflow-y: auto; }
        .hikaye-karti { background: #1e2e3b; border-radius: 14px; padding: 10px 12px; cursor: pointer; transition: all 0.2s ease; border-left: 4px solid #ff9f4a; }
        .hikaye-karti:hover { background: #2a4455; transform: translateX(4px); }
        .hikaye-baslik { font-weight: bold; font-size: 0.85rem; margin-bottom: 5px; color: #ffb86b; }
        .hikaye-ozet { font-size: 0.7rem; color: #cddcec; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .hikaye-sehir { font-size: 0.65rem; margin-top: 6px; color: #7fc9ff; font-style: italic; }
        .hikaye-icon, .roman-icon { background: #ff3333; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); border: 2px solid white; }
        .roman-icon { background: #3399ff; }
        .secim-ekrani { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a1a1f; z-index: 2000; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(8px); transition: opacity 0.5s ease; }
        .secim-kutusu { background: #0f1a24; padding: 40px 50px; border-radius: 40px; text-align: center; border: 1px solid #ff9f4a; max-width: 90%; }
        .secim-kutusu h1 { color: #ffb86b; font-size: 2rem; margin-bottom: 10px; }
        .secim-kutusu p { color: #aac8e0; margin-bottom: 30px; }
        .secim-butonlari { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; }
        .secim-butonu { background: #1e2e3b; border: none; padding: 15px 35px; font-size: 1.2rem; font-weight: bold; border-radius: 60px; cursor: pointer; color: white; }
        .secim-butonu:first-child { border-left: 4px solid #ff3333; }
        .secim-butonu:last-child { border-left: 4px solid #3399ff; }
        .secim-butonu:hover { transform: scale(1.05); background: #2a4455; }
        @media (max-width: 600px) { .secim-butonlari { gap: 15px; } .secim-butonu { padding: 10px 20px; font-size: 1rem; } .secim-kutusu { padding: 25px 30px; } }
        .custom-popup .leaflet-popup-content-wrapper { background: #1e2e3b; color: #f0f0f0; border-radius: 16px; border-left: 4px solid #ff9f4a; max-width: 350px; }
        .popup-title { font-size: 1rem; font-weight: bold; color: #ffb86b; margin-bottom: 6px; }
        .popup-summary { font-size: 0.75rem; line-height: 1.4; margin-bottom: 8px; }
        .popup-biyografi { font-size: 0.7rem; color: #aaa; border-top: 1px solid #444; padding-top: 6px; margin-top: 6px; }
        .popup-meta { font-size: 0.65rem; margin-top: 6px; color: #7fc9ff; }
    </style>
</head>
<body>
<div class="secim-ekrani" id="secimEkrani">
    <div class="secim-kutusu">
        <h1>📚 Edebiyat Atlası</h1>
        <p>Hangi dünyayı keşfetmek istersin?</p>
        <div class="secim-butonlari">
            <button class="secim-butonu" id="hikayeSec">📖 Hikayeler</button>
            <button class="secim-butonu" id="romanSec">📕 Romanlar</button>
        </div>
    </div>
</div>
<div class="app-container" id="appContainer">
    <div id="harita"></div>
    <div class="panel">
        <div class="panel-header">
            <h2 id="panelBaslik">📖 Hikayeler</h2>
            <button class="btn-ana-menu" id="anaMenuBtn">🏠 Ana Menü</button>
        </div>
        <input type="text" class="arama-kutusu" id="aramaInput" placeholder="🔍 Hikaye veya roman ara...">
        <div class="hikaye-listesi" id="hikayeListesi"></div>
    </div>
</div>

<script>
    // Şehir koordinatları (kısaltılmış, ama yeterli)
    const sehirMerkezleri = {
        "Adana": [37.0000, 35.3213], "Antalya": [36.8841, 30.7056], "Mersin": [36.8121, 34.6415],
        "İstanbul": [41.0082, 28.9784], "Ankara": [39.9334, 32.8597], "İzmir": [38.4192, 27.1287],
        "Van": [38.5012, 43.3730], "Erzurum": [39.9033, 41.2768], "Konya": [37.8714, 32.4848]
    };
    // Yazar biyografileri (örnek)
    const yazarBiyografi = {
        "Ahmet Ümit": "1960 Gaziantep doğumlu. Polisiye roman yazarı.",
        "Elif Şafak": "1971 Strazburg doğumlu. Çağdaş Türk edebiyatının önde gelen yazarlarından.",
        "Orhan Pamuk": "1952 İstanbul doğumlu. Nobel Edebiyat Ödüllü."
    };
    // Örnek hikayeler (3 adet)
    const hikayeler = [
        { baslik: "61) Birlikte Güçlüyüz", ozet: "Adana'da maddi zorluklar yaşayan bir aile, birbirine destek olarak zorlukları aşar. Dayanışma ve sevgi öne çıkar.", sehir: "Adana", yazar: "Ahmet Ümit" },
        { baslik: "62) Aynı Çatı Altında", ozet: "Antalya'da geniş bir ailenin farklı kuşakları aynı evde yaşar. Tartışmalar olsa da sevgi sayesinde bir arada kalırlar.", sehir: "Antalya", yazar: "Elif Şafak" },
        { baslik: "63) Annenin Eli", ozet: "Mersin'de bir çocuk, annesinin fedakarlıklarını fark eder ve ona olan sevgisi artar.", sehir: "Mersin", yazar: "Orhan Pamuk" }
    ];
    // Örnek romanlar (3 adet)
    const romanlar = [
        { baslik: "İnce Memed", ozet: "Çukurova'da bir eşkıyanın halk için verdiği mücadele. Aile bağları ve toprak adaleti.", sehir: "Adana", yazar: "Yaşar Kemal", yil: 1955 },
        { baslik: "Kürk Mantolu Madonna", ozet: "Sıradan bir adamın hayatına giren gizemli bir kadın. Aile içi fedakarlıklar.", sehir: "İstanbul", yazar: "Sabahattin Ali", yil: 1943 },
        { baslik: "Çalıkuşu", ozet: "Öğretmen Feride'nin Anadolu'da geçen hikayesi. Ailesini kaybeden Feride, öğrencileriyle yeni bir aile kurar.", sehir: "İstanbul", yazar: "Reşat Nuri Güntekin", yil: 1922 }
    ];

    function jitterCoord(coord, idx) { return [coord[0] + (Math.sin(idx)*0.02), coord[1] + (Math.cos(idx)*0.02)]; }
    let map, currentMarkers = [];
    function initMap() { if(map) map.remove(); map = L.map('harita').setView([39.5,33.5],6); L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: 'CartoDB' }).addTo(map); map.setMaxBounds([[35.5,25.5],[42.5,45.0]]); setTimeout(()=>map.invalidateSize(),100); }
    function getIcon(mode) { const c=mode==='hikaye'?'#ff3333':'#3399ff'; return L.divIcon({ html: `<div style="width:34px;height:34px;background:${c};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid white;">${mode==='hikaye'?'📖':'📕'}</div>`, iconSize:[34,34], popupAnchor:[0,-17] }); }
    function loadData(items,mode) { if(currentMarkers.length) currentMarkers.forEach(m=>map.removeLayer(m)); currentMarkers=[]; const icon=getIcon(mode); const liste=document.getElementById('hikayeListesi'); liste.innerHTML=''; items.forEach((item,idx)=>{ const coord=sehirMerkezleri[item.sehir]; if(!coord) return; const konum=jitterCoord(coord,idx); const bio=yazarBiyografi[item.yazar]||"Yazar hakkında bilgi yok."; const yilStr=mode==='roman'?` · ${item.yil}`:''; const popup=`<div class="popup-title">📖 ${item.baslik}</div><div class="popup-summary"><strong>Özet:</strong> ${item.ozet}</div><div class="popup-biyografi"><strong>✍️ ${item.yazar}</strong><br>${bio}</div><div class="popup-meta">📍 ${item.sehir}${yilStr}</div>`; const marker=L.marker(konum,{icon}).bindPopup(popup,{className:'custom-popup'}).addTo(map); currentMarkers.push(marker); const kart=document.createElement('div'); kart.className='hikaye-karti'; kart.innerHTML=`<div class="hikaye-baslik">${item.baslik}</div><div class="hikaye-ozet">${item.ozet.substring(0,80)}...</div><div class="hikaye-sehir">📍 ${item.sehir} · ${item.yazar}</div>`; kart.onclick=()=>{ map.setView(konum,12); marker.openPopup(); }; liste.appendChild(kart); }); document.getElementById('panelBaslik').innerHTML=mode==='hikaye'?'📖 Hikayeler':'📕 Romanlar'; setTimeout(()=>map.invalidateSize(),50); }
    let currentMode='hikaye', currentData=hikayeler;
    function filterData(term) { if(!term) return currentData; const t=term.toLowerCase(); return currentData.filter(i=>i.baslik.toLowerCase().includes(t)||i.yazar.toLowerCase().includes(t)||i.sehir.toLowerCase().includes(t)); }
    function refreshDisplay() { const filtered=filterData(document.getElementById('aramaInput').value); loadData(filtered,currentMode); }
    function switchMode(mode) { currentMode=mode; currentData=mode==='hikaye'?hikayeler:romanlar; initMap(); refreshDisplay(); }

    document.getElementById('hikayeSec').onclick=()=>{ switchMode('hikaye'); document.getElementById('secimEkrani').style.opacity='0'; setTimeout(()=>{ document.getElementById('secimEkrani').style.display='none'; document.getElementById('appContainer').style.opacity='1'; },400); };
    document.getElementById('romanSec').onclick=()=>{ switchMode('roman'); document.getElementById('secimEkrani').style.opacity='0'; setTimeout(()=>{ document.getElementById('secimEkrani').style.display='none'; document.getElementById('appContainer').style.opacity='1'; },400); };
    // ANA MENÜ: sayfayı yenile (en garanti çözüm)
    document.getElementById('anaMenuBtn').onclick=()=>{ location.reload(); };
    document.getElementById('aramaInput').addEventListener('input', refreshDisplay);
    document.getElementById('appContainer').style.opacity='0';
</script>
</body>
</html>
