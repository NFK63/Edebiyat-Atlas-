    hikayeler.push({ title: "104) Kahvaltı Sofrası", summary: "Aydın’da aile uzun kahvaltıda sohbet eder, günü planlar. Sofra birleştirir.", city: "Aydın" });
    hikayeler.push({ title: "105) Yazlık Ev", summary: "İzmir’de yazlıkta tatil yapan aile, oyunlar oynar, denize girer. Ortak anılar.", city: "İzmir" });
    hikayeler.push({ title: "106) Balıkçı Kasabası", summary: "Balıkesir’de balıkçı ailesi birlikte çalışır, kazandıklarını paylaşır. Dayanışma.", city: "Balıkesir" });
    hikayeler.push({ title: "107) Lavanta Kokusu", summary: "Isparta’da aile lavanta tarlasında birlikte çalışır. Doğa içinde bağlar güçlenir.", city: "Isparta" });
    hikayeler.push({ title: "108) Köy Düğünü", summary: "Denizli’de aile düğün için bir araya gelir, akrabalarla buluşur. Özel günler aileyi birleştirir.", city: "Denizli" });
    hikayeler.push({ title: "109) Akşamüstü Çayı", summary: "İzmir’de aile her gün çay saatinde buluşur. Düzenli iletişim bağları kuvvetlendirir.", city: "İzmir" });
    hikayeler.push({ title: "110) Birlikte Tamir", summary: "Muğla’da aile eski bir tekneyi birlikte tamir eder. Ortak çaba yakınlaştırır.", city: "Muğla" });

    // --------------------------------------------------------------
    // 3) Haritayı kur
    // --------------------------------------------------------------
    const map = L.map('harita').setView([39.0, 35.0], 6);  // Orta Anadolu

    // Sade, tek renk harita: CartoDB Voyager (gri/beyaz tonları)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CartoDB',
        subdomains: 'abcd',
        maxZoom: 19,
        minZoom: 4
    }).addTo(map);

    // Marker Cluster grubu
    const markers = L.markerClusterGroup({
        chunkedLoading: true,
        spiderfyOnMaxZoom: true,
        showCoverageOnHover: false,
        zoomToBoundsOnClick: true,
        maxClusterRadius: 50
    });

    // Her hikaye için marker ekle
    hikayeler.forEach(h => {
        let cityKey = h.city;
        // Çukurova özel durumu
        if (cityKey === "Çukurova") cityKey = "Adana";
        // normalize: bazı şehirlerde küçük harf farkı olursa diye (hepsi doğru girildi varsay)
        const coord = coords[cityKey];
        if (coord) {
            const popupContent = `
                <div style="min-width: 200px; max-width: 280px;">
                    <div class="popup-title">📖 ${h.title}</div>
                    <div class="popup-summary">${h.summary}</div>
                    <div class="popup-location">📍 ${h.city}</div>
                </div>
            `;
            const marker = L.marker(coord, {
                title: h.title,
                riseOnHover: true
            });
            marker.bindPopup(popupContent, { className: 'custom-popup', maxWidth: 300 });
            markers.addLayer(marker);
        } else {
            console.warn("Koordinat bulunamadı:", h.city, h.title);
        }
    });

    map.addLayer(markers);

    // Biraz daha kullanıcı dostu: cluster tıklamada zoom
    markers.on('clusterclick', function (a) {
        a.layer.spiderfy();
    });
</script>
</body>
</html>
