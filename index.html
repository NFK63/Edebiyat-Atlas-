<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edebiyat Atlası | Teknofest Projesi</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #001529; color: white; overflow: hidden; }
        #welcome-screen {
            position: absolute; width: 100%; height: 100%; 
            background: radial-gradient(circle, #002140 0%, #001529 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 9999; text-align: center;
        }
        .btn-container { display: flex; gap: 30px; margin-top: 40px; }
        .choice-btn {
            padding: 25px 50px; font-size: 22px; font-weight: bold; cursor: pointer;
            border: 2px solid #1890ff; background: rgba(24, 144, 255, 0.1); color: white; 
            border-radius: 15px; transition: 0.3s;
        }
        .choice-btn:hover { background: #1890ff; transform: scale(1.1); box-shadow: 0 0 20px #1890ff; }
        #map { height: 100vh; width: 100%; display: none; }
        .back-btn {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            padding: 10px 20px; background: #ff4d4f; color: white; border: none; 
            cursor: pointer; border-radius: 8px; font-weight: bold; display: none;
        }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1 style="font-size: 50px; margin-bottom: 10px;">📚 EDEBİYAT ATLASI</h1>
        <p style="font-size: 20px; opacity: 0.8;">Hangi türü keşfetmek istersiniz?</p>
        <div class="btn-container">
            <button class="choice-btn" onclick="startApp('hikaye')">HİKAYE</button>
            <button class="choice-btn" onclick="startApp('roman')">ROMAN</button>
        </div>
    </div>

    <button class="back-btn" id="backBtn" onclick="location.reload()">⬅ Geri Dön</button>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map;
        var markers = [];
        var veriler = {
            hikaye: [
                { ad: "Kaşağı", yazar: "Ömer Seyfettin", yer: "Balıkesir, Gönen", koord: [40.10, 27.65], ozet: "Vicdan azabı üzerine kurulmuş bir çocukluk hikayesi." }
            ],
            roman: [
                { ad: "Çalıkuşu", yazar: "Reşat Nuri Güntekin", yer: "Bursa, Zeyniler", koord: [40.18, 29.06], ozet: "Feride'nin Anadolu'daki öğretmenlik mücadelesi." }
            ]
        };

        function startApp(tur) {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('map').style.display = 'block';
            document.getElementById('backBtn').style.display = 'block';

            if (!map) {
                map = L.map('map').setView([39.0, 35.2], 6);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            }

            markers.forEach(m => map.removeLayer(m));
            veriler[tur].forEach(function(item) {
                var m = L.marker(item.koord).addTo(map)
                    .bindPopup(`<b style="color:#1890ff; font-size:16px;">${item.ad}</b><br><i>${item.yazar}</i><hr><b>Mekan:</b> ${item.yer}<br><b>Özet:</b> ${item.ozet}`);
                markers.push(m);
            });
        }
    </script>
</body>
</html>
